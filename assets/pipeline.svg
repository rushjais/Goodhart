<svg viewBox="0 0 1140 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f0b429"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#56d4dd"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1140" height="640" rx="18" fill="#0d1117"/>
  <text x="40" y="52" fill="#e6edf3" font-size="26" font-weight="700">Goodhart — the hardening loop</text>
  <text x="40" y="80" fill="#8b949e" font-size="15">Point it at a grader → red swarm breaches it → green team seals the holes → robustness climbs, measured on held-out truth.</text>

  <!-- stage cards -->
  <!-- A: Grader -->
  <rect x="40" y="150" width="156" height="128" rx="12" fill="#161b22" stroke="#56d4dd" stroke-width="1.5"/>
  <text x="118" y="182" fill="#56d4dd" font-size="15" font-weight="700" text-anchor="middle">Grader (env)</text>
  <text x="118" y="210" fill="#e6edf3" font-size="12" text-anchor="middle">stock visible</text>
  <text x="118" y="227" fill="#e6edf3" font-size="12" text-anchor="middle">test suite</text>
  <text x="118" y="255" fill="#8b949e" font-size="11" text-anchor="middle">EvalPlus base_input</text>

  <!-- B: Red swarm + conductor -->
  <rect x="240" y="150" width="156" height="128" rx="12" fill="#161b22" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="318" y="182" fill="#ff6b6b" font-size="15" font-weight="700" text-anchor="middle">Red swarm</text>
  <text x="318" y="208" fill="#e6edf3" font-size="11" text-anchor="middle">sapper · forger</text>
  <text x="318" y="224" fill="#e6edf3" font-size="11" text-anchor="middle">edge-slipper</text>
  <rect x="262" y="238" width="112" height="26" rx="6" fill="#1c2230" stroke="#a371f7" stroke-width="1"/>
  <text x="318" y="255" fill="#a371f7" font-size="11" text-anchor="middle">+ conductor · 4 levers</text>

  <!-- C: Breach -->
  <rect x="440" y="150" width="156" height="128" rx="12" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="518" y="182" fill="#d29922" font-size="15" font-weight="700" text-anchor="middle">Breach</text>
  <text x="518" y="212" fill="#e6edf3" font-size="13" text-anchor="middle">passes grader</text>
  <text x="518" y="230" fill="#e6edf3" font-size="13" text-anchor="middle">fails oracle</text>
  <text x="518" y="256" fill="#8b949e" font-size="12" text-anchor="middle">R = 1 , T = 0</text>

  <!-- D: Green team -->
  <rect x="640" y="150" width="156" height="128" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="718" y="182" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">Green team</text>
  <text x="718" y="208" fill="#e6edf3" font-size="11" text-anchor="middle">picks a hardening</text>
  <text x="718" y="224" fill="#e6edf3" font-size="11" text-anchor="middle">patch template</text>
  <text x="718" y="255" fill="#8b949e" font-size="11" text-anchor="middle">pristine_readonly…</text>

  <!-- E: Regression gate -->
  <rect x="840" y="150" width="156" height="128" rx="12" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="918" y="182" fill="#a371f7" font-size="15" font-weight="700" text-anchor="middle">Regression gate</text>
  <text x="918" y="212" fill="#e6edf3" font-size="12" text-anchor="middle">breach → 0</text>
  <text x="918" y="230" fill="#e6edf3" font-size="12" text-anchor="middle">∧  gold → 1</text>
  <text x="918" y="256" fill="#8b949e" font-size="11" text-anchor="middle">else: patch_rejected</text>

  <!-- F: Robustness -->
  <rect x="1004" y="150" width="100" height="128" rx="12" fill="#161b22" stroke="#f0b429" stroke-width="1.5"/>
  <text x="1054" y="182" fill="#f0b429" font-size="14" font-weight="700" text-anchor="middle">Robust ↑</text>
  <text x="1054" y="210" fill="#e6edf3" font-size="11" text-anchor="middle">held-out</text>
  <text x="1054" y="232" fill="#e6edf3" font-size="11" text-anchor="middle">+ honest</text>
  <text x="1054" y="254" fill="#e6edf3" font-size="11" text-anchor="middle">pass</text>

  <!-- flow arrows -->
  <line x1="196" y1="214" x2="238" y2="214" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="396" y1="214" x2="438" y2="214" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="596" y1="214" x2="638" y2="214" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="796" y1="214" x2="838" y2="214" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="996" y1="214" x2="1002" y2="214" stroke="#f0b429" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- escalate feedback loop E -> B -->
  <path d="M918 150 C 918 96, 318 96, 318 148" fill="none" stroke="#a371f7" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="618" y="86" fill="#a371f7" font-size="12" text-anchor="middle">escalate — next round faces the harder grader (red ↔ green)</text>

  <!-- oracle band -->
  <rect x="40" y="360" width="956" height="74" rx="12" fill="#10161f" stroke="#56d4dd" stroke-width="1.3"/>
  <text x="62" y="390" fill="#56d4dd" font-size="15" font-weight="700">Oracle — held-out ground truth</text>
  <text x="62" y="414" fill="#8b949e" font-size="12.5">EvalPlus plus_input tests (gold-derived), disjoint from the grader's cases. Independent. Never shown to agents, never used to select.</text>
  <!-- dashed links from oracle up to Breach (T=0) and Gate -->
  <line x1="518" y1="360" x2="518" y2="280" stroke="#56d4dd" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#arrowDash)"/>
  <text x="528" y="330" fill="#56d4dd" font-size="11">T = 0 check</text>

  <!-- honesty pills -->
  <text x="40" y="490" fill="#e6edf3" font-size="15" font-weight="700">The protected invariant — eval honesty</text>
  <g font-size="12.5">
    <rect x="40" y="506" width="240" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
    <text x="160" y="531" fill="#e6edf3" text-anchor="middle">train / held-out breach split</text>
    <rect x="296" y="506" width="240" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
    <text x="416" y="531" fill="#e6edf3" text-anchor="middle">honest-pass tracked beside every #</text>
    <rect x="552" y="506" width="240" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
    <text x="672" y="531" fill="#e6edf3" text-anchor="middle">deterministic subprocess sandbox</text>
    <rect x="808" y="506" width="296" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
    <text x="956" y="531" fill="#e6edf3" text-anchor="middle">no LLM-as-judge in the verdict path</text>
  </g>

  <text x="40" y="596" fill="#8b949e" font-size="12">engine: agents/ · conductor/ · green/      grading: grader/ · oracle/ · gate/ · templates/      metrics: breadth/ · consequence/      surfaces: server/ · dashboard/ · viz3d/</text>
</svg>
